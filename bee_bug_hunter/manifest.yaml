# List every business-case API flow to monitor and the containers backing it.
#
# kind: ui (default) drives bee_bug_hunter/flows/<name>.yaml via Playwright, a real
#       browser -- for flows that render/click something, expressed as a declarative
#       step list (goto/click/fill/wait_for_selector/wait_for_response/expect_status/
#       expect_text).
# kind: script also drives a real browser via Playwright, but calls a registered plain
#       Python async function from bee_bug_hunter/playwright_flows.py instead
#       (api_flow: <registry name>) -- for flows that need real control flow (loops,
#       conditionals, multi-page interaction) the YAML step DSL can't express. To add
#       one: write an async def taking (page, network_log) in playwright_flows.py,
#       decorate it with @playwright_flow("<registry name>"), then reference that name
#       here as api_flow:. See playwright_flows.py:example_login_script for a
#       step-for-step scripted rewrite of the example_login.yaml flow below.
# kind: api skips Playwright entirely and calls a registered Python/requests function
#       from bee_bug_hunter/api_flows.py instead (api_flow: <registry name>) -- for
#       flows that are pure JSON API calls with nothing to render.
#
# Optional per-flow overrides (fall back to .env's MYSQL_*/local docker when omitted):
#   docker_host: null for the local docker daemon, or a docker CLI target such as
#                tcp://host:2376 / ssh://user@host -- passed through as DOCKER_HOST
#                to the `docker logs` subprocess, so Docker Log Capturer can reach a
#                remote engine instead of assuming everything runs on this machine.
#   mysql:       host/port/user/password/database overrides for DB Query Agent /
#                SQL Performance Agent's run_mysql_query tool, for flows whose DB
#                isn't the single one configured in .env.
#
# container_stacks: optional root-level map, name -> free-text stack description
#                    (e.g. "Python 3.11, Flask, SQLAlchemy"). Prompt context only for
#                    the Source Code Analyst -- purely descriptive, nothing branches
#                    on it in code, so it's safe to omit entirely. Keyed by container
#                    name (not per-flow) since the same container can back multiple
#                    flows above; each flow only gets told about the stacks of the
#                    containers it actually lists.
duration_seconds: 30
poll_interval_seconds: 300

container_stacks:
  demo-api: "Python 3.11, Flask, SQLAlchemy"
  demo-db: "MySQL 8"

flows:
  - name: example_login
    containers: [demo-api, demo-db]
    # docker_host: tcp://remote-docker-host:2376
    # mysql:
    #   host: remote-db-host
    #   database: demo
  - name: example_orders
    containers: [demo-api, demo-db]
  - name: example_login_api
    kind: api
    api_flow: example_login_api
    containers: [demo-api, demo-db]
  # - name: example_login_script    # kind: script example (commented out -- same
  #   kind: script                  # bug as example_login above, written as a
  #   api_flow: example_login_script  # plain Playwright script instead of YAML)
  #   containers: [demo-api, demo-db]
